{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-container">
    
    <h2 class="login__titulo">Link & Learn</h2>

    <form method="POST" class="login__form">
        {% csrf_token %}

        <div class="login__campo">
            <label for="{{ form.username.id_for_label }}">Endereço de email:</label>
            {{ form.username }}
        </div>

        <div class="login__campo">
            <label for="{{ form.password.id_for_label }}">Senha:</label>
            {{ form.password }}
            
            <div style="text-align: right; margin-top: 5px;">
                <a href="{% url 'password_reset' %}" class="link-esqueci-senha" style="font-size: 0.9rem; color: var(--primary);">Esqueci minha senha</a>
            </div>
        </div>
        
        {% if form.errors %}
            <p class="login__erro">Seu email ou senha estão incorretos. Tente novamente.</p>
        {% endif %}

        <button type="submit" class="login__botao">Entrar</button>
    </form>
    
    <p class="login__footer-text">
        Não tem uma conta? <a href="{% url 'cadastro_aluno' %}" class="link-autenticacao">Cadastre-se</a>
    </p>
</div>
{% endblock %}
